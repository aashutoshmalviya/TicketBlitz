version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ticketblitz-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"] # Basic persistence
    networks:
      - ticketblitz-network

  postgres:
    image: postgres:15-alpine
    container_name: ticketblitz-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ticketblitz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    networks:
      - ticketblitz-network

networks:
  ticketblitz-network:
    driver: bridge