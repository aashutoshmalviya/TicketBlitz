<div class="register-container">
  <div class="register-card">
    <h2 class="register-title">Join TicketBlitz</h2>
    <p class="register-subtitle">
      Create your account to start booking events
    </p>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" [(ngModel)]="registerData.username" name="username" class="form-input"
          required />
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" [(ngModel)]="registerData.email" name="email" class="form-input" required />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" [(ngModel)]="registerData.password" name="password" class="form-input"
          required />
      </div>

      <button type="submit" [disabled]="isLoading()" class="register-btn">
        {{ isLoading() ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="register-footer">
      <p>
        Already have an account?
        <a routerLink="/login" class="login-link">Sign in</a>
      </p>
    </div>

    <div *ngIf="errorMessage()" class="error-message">
      {{ errorMessage() }}
    </div>
  </div>
</div>
