<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">Sign in to your TicketBlitz account</p>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" [(ngModel)]="loginData.username" name="username" class="form-input" required />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" [(ngModel)]="loginData.password" name="password" class="form-input"
          required />
      </div>

      <button type="submit" [disabled]="isLoading()" class="login-btn">
        {{ isLoading() ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <div class="login-footer">
      <p>
        Don't have an account?
        <a routerLink="/register" class="register-link">Sign up</a>
      </p>
    </div>

    <div *ngIf="errorMessage()" class="error-message">
      {{ errorMessage() }}
    </div>
  </div>
</div>
